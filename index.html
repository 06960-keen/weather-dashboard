<!DOCTYPE html>
<html>
<head>
  <title>Weather Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: Arial;
      background: linear-gradient(to bottom, #1e3c72, #2a5298);
      color: white;
      text-align: center;
      margin: 0;
      padding: 200px;
    }
    h1 {
      margin-bottom: 5px;
    }
    #time {
      font-size: 20px;
      opacity: 0.8;
      margin-bottom: 20px;
    }

    .container {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
    }

    .card {
      background: rgba(0,0,0,0.3);
      margin: 10px;
      padding: 20px;
      border-radius: 15px;
      width: 300px;
      backdrop-filter: blur(50px);
    }

    .big {
      font-size: 40px;
      font-weight: bold;
    }

    #weatherText {
      font-size: 50px;
      margin-bottom: 10px;
    }

    #rec {
      font-size: 25px;
      margin-top: 10px;
    }

    canvas {
      margin-top: 30px;
      max-width: 600px;
    }
  </style>
</head>
<body>

<h1>🌦 Weather Dashboard</h1>
<p id="time">--</p>

<h2 id="weatherText">--</h2>

<div class="container">
  <div class="card">
    <div>Temp</div>
    <div id="temp" class="big">--</div>
  </div>

  <div class="card">
    <div>Humidity</div>
    <div id="humidity" class="big">--</div>
  </div>

  <div class="card">
    <div>PM2.5</div>
    <div id="pm25" class="big">--</div>
  </div>

  <div class="card">
    <div>UV</div>
    <div id="uv" class="big">--</div>
  </div>
</div>

<h2>Prediction</h2>

<div class="container">
  <div class="card">
    <div>Temp</div>
    <div id="pred_temp" class="big">--</div>
  </div>

  <div class="card">
    <div>Humidity</div>
    <div id="pred_humidity" class="big">--</div>
  </div>

  <div class="card">
    <div>PM2.5</div>
    <div id="pred_pm25" class="big">--</div>
  </div>

  <div class="card">
    <div>UV</div>
    <div id="pred_uv" class="big">--</div>
  </div>
</div>

<h2>Recommendation</h2>
<p id="rec">--</p>

<canvas id="tempChart"></canvas>
  
<script>
function getWeatherText(data) {
  let tempHistory = [];
  let labels = [];

  // 1️⃣ Rain
  if (data.humidity > 60 && data.uv < 20)
    labels.push("🌧️ Rainy");

  // 2️⃣ Air quality
  if (data.pm25 > 100)
    labels.push("😷 Very polluted");
  else if (data.pm25 > 50)
    labels.push("😷 Polluted");

  // 3️⃣ UV
  if (data.uv > 25)
    labels.push("🌡️🔥 Extreme UV / very hot");
  else if (data.uv > 15)
    labels.push("☀️ Sunny");

  // 4️⃣ Temperature
  if (data.temp > 35)
    labels.push("🥵 Hot");
  else if (data.temp < 27)
    labels.push("🧥 Chilly");

  // 5️⃣ Humidity / cloudy
  if (data.humidity > 60)
    labels.push("☁️ High humidity / cloudy");

  // Default
  if (labels.length == 0)
    labels.push("🙂 Normal weather");

  // Join multiple labels
  return labels.join(" | ");
}

// Update UI
function updateUI(data) {
  document.getElementById("temp").innerText = data.temp;
  document.getElementById("humidity").innerText = data.humidity;
  document.getElementById("pm25").innerText = data.pm25;
  document.getElementById("uv").innerText = data.uv;

  document.getElementById("pred_temp").innerText = data.pred_temp;
  document.getElementById("pred_humidity").innerText = data.pred_humidity;
  document.getElementById("pred_pm25").innerText = data.pred_pm25;
  document.getElementById("pred_uv").innerText = data.pred_uv;

  // Display recommendation / weather text
  document.getElementById("rec").innerText = data.rec1 || "--";
  document.getElementById("weatherText").innerText = getWeatherText(data);

  // Update time
  document.getElementById("time").innerText =
    "Last update: " + new Date().toLocaleTimeString();

  // Add to graph
  tempHistory.push(data.temp);
  labels.push(new Date().toLocaleTimeString());

  if (tempHistory.length > 10) {
    tempHistory.shift();
    labels.shift();
  }

  chart.update();
}

// Fetch Firebase every 2 sec
async function fetchData() {
  try {
    const res = await fetch("https://weatherproject2026-default-rtdb.asia-southeast1.firebasedatabase.app/data.json");
    const data = await res.json();
    if (data) updateUI(data);
  } catch (err) {
    console.log("Error fetching data:", err);
  }
}
setInterval(fetchData, 2000);
fetchData(); // run immediately
</script>

</body>
</html>
