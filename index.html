<!DOCTYPE html>
<html>
<head>
  <title>Weather Dashboard</title>
  <style>
    body {
      font-family: Georgia;
      background: #111;
      color: #fff;
      text-align: center;
    }
    .card {
      background: #222;
      margin: 10px;
      padding: 20px;
      border-radius: 10px;
      display: inline-block;
      width: 200px;
    }
    h2 { margin: 0; }

    #rec {
      font-size: 24px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h1>🌦 Weather Dashboard</h1>

<h2 id="weatherText">--</h2>

<div class="card">
  <h2>Temp</h2>
  <p id="temp">--</p>
</div>

<div class="card">
  <h2>Humidity</h2>
  <p id="humidity">--</p>
</div>

<div class="card">
  <h2>PM2.5</h2>
  <p id="pm25">--</p>
</div>

<div class="card">
  <h2>UV</h2>
  <p id="uv">--</p>
</div>

<hr>

<h2>Prediction</h2>

<div class="card">
  <h2>Temp</h2>
  <p id="pred_temp">--</p>
</div>

<div class="card">
  <h2>Humidity</h2>
  <p id="pred_humidity">--</p>
</div>

<div class="card">
  <h2>PM2.5</h2>
  <p id="pred_pm25">--</p>
</div>

<div class="card">
  <h2>UV</h2>
  <p id="pred_uv">--</p>
</div>

<hr>

<h2>Recommendation</h2>
<p id="rec">--</p>

<script>
function getWeatherText(data) {
  let labels = [];

  // 1️⃣ Rain
  if (data.humidity > 60 && data.temp < 35 && data.uv < 20)
    labels.push("🌧️ Rainy / bring umbrella");

  // 2️⃣ Air quality
  if (data.pm25 > 100)
    labels.push("😷 Very polluted");
  else if (data.pm25 > 50)
    labels.push("😷 Polluted");

  // 3️⃣ UV
  if (data.uv > 25)
    labels.push("🌡️🔥 Extreme UV / very hot");
  else if (data.uv > 15)
    labels.push("☀️ Sunny");

  // 4️⃣ Temperature
  if (data.temp > 35)
    labels.push("💧 Stay hydrated");
  else if (data.temp < 27)
    labels.push("🧥 Chilly / wear warm clothes");

  // 5️⃣ Humidity / cloudy
  if (data.humidity > 60)
    labels.push("☁️ High humidity / cloudy");

  // Default
  if (labels.length == 0)
    labels.push("🙂 Normal weather");

  // Join multiple labels
  return labels.join(" | ");
}

// Update UI
function updateUI(data) {
  document.getElementById("temp").innerText = data.temp;
  document.getElementById("humidity").innerText = data.humidity;
  document.getElementById("pm25").innerText = data.pm25;
  document.getElementById("uv").innerText = data.uv;

  document.getElementById("pred_temp").innerText = data.pred_temp;
  document.getElementById("pred_humidity").innerText = data.pred_humidity;
  document.getElementById("pred_pm25").innerText = data.pred_pm25;
  document.getElementById("pred_uv").innerText = data.pred_uv;

  // Display recommendation / weather text
  document.getElementById("rec").innerText = data.rec1 || "--";
  document.getElementById("weatherText").innerText = getWeatherText(data);
}

// Fetch Firebase every 2 sec
async function fetchData() {
  try {
    const res = await fetch("https://weatherproject2026-default-rtdb.asia-southeast1.firebasedatabase.app/data.json");
    const data = await res.json();
    if (data) updateUI(data);
  } catch (err) {
    console.log("Error fetching data:", err);
  }
}
setInterval(fetchData, 2000);
fetchData(); // run immediately
</script>

</body>
</html>
