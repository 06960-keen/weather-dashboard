<!DOCTYPE html>
<html>
<head>
  <title>Weather Dashboard</title>
  <style>
    body {
  font-family: Arial;
  font-size: 25px;
  margin: 0;
  min-height: 100vh;

  background: linear-gradient(
    to bottom,
    #8f9df6,
    #3d4db7,
    #1f2d87
  );

  background-repeat: no-repeat;
  background-attachment: fixed;

  color: white;
  text-align: center;
}

    .title {
      font-size: 50px;
      margin-top: 10px;
    }

    .time {
      opacity: 0.5;
      font-size: 40px;
    }

    .main {
      margin: 50px 0;
    }

    .temp {
      font-size: 120px;
      font-weight: bold;
    }

    .weatherText {
      font-size: 60px;
      font-weight: bold;
    }

    .recommendation {
      margin: 30px;
      font-size: 40px;
      font-weight: bold;
    }

    .cards {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 20px;
    }

    .card {
      background: rgba(0,0,0,0.3);
      padding: 50px;
      border-radius: 10px;
      font-size: 40px;
      font-weight: bold;
      width: 120px;
    }
  </style>
</head>
<body>

  <h3 class="title">Weather Dashboard</h3>
  <p class="time" id="time">--</p>

  <div class="main">
    <div class="temp" id="temp">--°C</div>
    <div class="weatherText" id="weatherText">--</div>
  </div>

  <div class="recommendation" id="rec">--</div>

  <h3>Current</h3>
  <div class="cards">
    <div class="card">Humid<br><span id="hum">--</span></div>
    <div class="card">PM2.5<br><span id="pm">--</span></div>
    <div class="card">UV<br><span id="uv">--</span></div>
  </div>

  <h3>Prediction</h3>
  <div class="cards">
    <div class="card">Temp<br><span id="ptemp">--</span></div>
    <div class="card">Humid<br><span id="phum">--</span></div>
    <div class="card">PM2.5<br><span id="ppm">--</span></div>
    <div class="card">UV<br><span id="puv">--</span></div>
  </div>

  <script>
  function getWeatherText(data) {
  let tempHistory = [];
  let labels = [];

  // 1️⃣ Rain
  if (data.humidity > 60 && data.uv < 20)
    labels.push("🌧️ Rainy");

  // 2️⃣ Air quality
  if (data.pm25 > 100)
    labels.push("😷 Very polluted");
  else if (data.pm25 > 50)
    labels.push("😷 Polluted");

  // 3️⃣ UV
  if (data.uv > 25)
    labels.push("🌡️🔥 Extreme UV / very hot");
  else if (data.uv > 15)
    labels.push("☀️ Sunny");

  // 4️⃣ Temperature
  if (data.temp > 35)
    labels.push("🥵 Hot");
  else if (data.temp < 27)
    labels.push("🧥 Chilly");

  // 5️⃣ Humidity / cloudy
  if (data.humidity > 60)
    labels.push("☁️ High humidity / cloudy");

  // Default
  if (labels.length == 0)
    labels.push("🙂 Normal weather");

  // Join multiple labels
  return labels.join(" | ");
  }
  function updateUI(data) {
    document.getElementById("temp").innerText = data.temp.toFixed(1) + "°C";
    document.getElementById("hum").innerText = data.humidity;
    document.getElementById("pm").innerText = data.pm25;
    document.getElementById("uv").innerText = data.uv;

    document.getElementById("ptemp").innerText = data.pred_temp.toFixed(1);
    document.getElementById("phum").innerText = data.pred_humidity.toFixed(1);
    document.getElementById("ppm").innerText = data.pred_pm25.toFixed(1);
    document.getElementById("puv").innerText = data.pred_uv.toFixed(1);

    // weather text
    document.getElementById("weatherText").innerText = getWeatherText(data);

    // recommendation (combine multiple)
    let recText = data.rec1 || "";
    if (data.rec2) recText += " | " + data.rec2;
    if (data.rec3) recText += " | " + data.rec3;

    document.getElementById("rec").innerText = recText;

    // time
    document.getElementById("time").innerText = "Last update: " + new Date().toLocaleTimeString();
    }
    // Fetch Firebase every 2 sec
    async function fetchData() {
      try {
        const res = await fetch("https://weatherproject2026-default-rtdb.asia-southeast1.firebasedatabase.app/data.json");
        const data = await res.json();
        if (data) updateUI(data);
    } catch (err) {
        console.log("Error fetching data:", err);
    }
  }
  setInterval(fetchData, 2000);
  fetchData(); // run immediately
</script>

</body>
</html>
